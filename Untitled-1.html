<!DOCTYPE html>
<html>
<head>
  <title>Personal Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom right, #EABEC3, #EABEC3);
      text-align: center;
    }
    .container {
      padding: 80px 20px;
    }
    h1 {
      font-size: 40px;
      color: #d0637c;
    }
    p {
      color: #334155;
    }
    .btn {
      background: #d0637c;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Personal Tracker</h1>
  <p>A mindful tracker designed for your modern lifestyle. Perfectly balancing daily habits, wellness, dreams and goals</p>
  <a href="#" class="btn">Get Started for Free</a>

  <div class="cards">
    <div class="card">
      <h3>Daily Habits</h3>
      <p>Track consistency with visual progress</p>
    </div>
    <div class="card">
      <h3>Detailed Analytics</h3>
      <p>Understand your progress with charts</p>
    </div>
  </div>
</div>

</body>
</html>
